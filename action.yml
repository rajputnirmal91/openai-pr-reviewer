name: 'OpenAI PR Reviewer'
description: 'Review PRs with OpenAI and comment inline'
author: 'Nirmal Rajput'
inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  openai-api-key:
    description: 'OpenAI API key'
    required: true
  model:
    description: 'OpenAI model to use'
    required: false
    default: 'gemini-2.5-flash'
  max-files:
    description: 'Maximum files to review'
    required: false
    default: '10'
runs:
  using: 'composite'
  steps:
    - run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
    - run: node src/index.js
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_AI_API_KEY: ${{ inputs.ai-api-key }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_MAX_FILES: ${{ inputs.max-files }}
branding:
  icon: 'check-circle'
  color: 'green'
